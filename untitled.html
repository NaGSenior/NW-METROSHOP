 <style>
  :root {
    --deep-blue: #000428;
    --neon-blue: #0088ff;
    --light-blue: #00ccff;
}

html {
    height: auto;
    overflow-x: hidden;
    overflow-y: auto;
    scrollbar-width: none;
    scroll-behavior: smooth;
}

body {
    margin: 0; 
    padding: 0;
    background: #000;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100.1vh;
    width: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -ms-overflow-style: none;
}
body.chat-open #main, 
body.chat-open .bottom-menu, 
body.chat-open #custom-scroll-track,
body.chat-open #chat-button,
body.chat-open .site-footer {
    opacity: 0 !important;
    pointer-events: none !important;
    transform: scale(0.9);
    transition: 0.4s ease;
}
#main { 
    position: relative; 
    z-index: 10; 
    opacity: 0; 
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 
    padding: 20px; 
}
body.loaded #main { 
    opacity: 1; 
    transform: scale(1);
}
::-webkit-scrollbar {
    display: none !important;
}
#custom-scroll-track {
    position: fixed;
    right: 4px;
    top: 10px;
    bottom: 90px;
    width: 6px;
    z-index: 10001;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    pointer-events: none;
    transition: 0.3s;
}
#custom-scroll-thumb {
    width: 100%;
    height: 60px;
    background: linear-gradient(180deg, var(--neon-blue), var(--light-blue));
    border-radius: 50px;
    box-shadow: 0 0 15px var(--neon-blue);
    will-change: transform; 
    transition: transform 0.05s linear;
}
.animated-bg {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(125deg, #000428, #004e92, #0088ff, #00ccff, #001a33);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    z-index: 1;
}
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.cubes { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
.cube { position: absolute; animation: rise 10s infinite linear; bottom: -100px; opacity: 0; }
@keyframes rise {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    20% { opacity: 0.5; }
    80% { opacity: 0.5; }
    100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
}
#loader {
    position: fixed; inset: 0; background: #000; z-index: 10000;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    transition: 1s;
}
.loader-logo {
    width: 140px; height: 140px;
    border-radius: 50%;
    box-shadow: 0 0 40px var(--neon-blue);
    animation: pulseLogo 1.5s infinite ease-in-out;
    background: url('Avaformetroshop.png') center/cover no-repeat;
    border: 3px solid var(--light-blue);
}
@keyframes pulseLogo {
    0% { transform: scale(0.9); }
    50% { transform: scale(1.1); box-shadow: 0 0 60px var(--light-blue); }
    100% { transform: scale(0.9); }
}
body.loaded #loader { opacity: 0; pointer-events: none; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.card {
    background: rgba(0, 10, 30, 0.7);
    border: 2px solid var(--neon-blue); border-radius: 15px;
    padding: 10px; text-align: center; backdrop-filter: blur(10px);
    transition: 0.2s; cursor: pointer;
}
.card:active { transform: scale(0.92); }
.card img { width: 100%; border-radius: 10px; }
#overlay {
    position: fixed; inset: 0; background: rgba(0, 5, 20, 0.98);
    z-index: 10000; display: none; flex-direction: column;
    padding: 25px; box-sizing: border-box; backdrop-filter: blur(15px);
}
.slide-in { animation: slideIn 0.4s forwards; }
.slide-out { animation: slideOut 0.4s forwards; }
@keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes slideOut { from { transform: translateY(0); } to { transform: translateY(100%); } }
.back-btn { color: var(--light-blue); padding: 10px 0; cursor: pointer; font-weight: bold; font-size: 18px; }
.buy-btn {
    background: linear-gradient(45deg, var(--neon-blue), var(--light-blue));
    color: white; text-decoration: none; padding: 18px; border-radius: 15px;
    text-align: center; font-weight: bold; margin-top: 30px; width: 100%;
    box-shadow: 0 0 25px var(--neon-blue); display: block;
}
.bottom-menu {
    position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
    z-index: 1000; display: flex; gap: 15px; padding: 10px 20px;
    background: linear-gradient(135deg, #1e3a8a, #3b82f6); 
    backdrop-filter: blur(10px); border-radius: 30px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 15px rgba(59, 130, 246, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.3s;
}
.menu-item img { width: 32px; height: 32px; border-radius: 8px; transition: 0.3s; filter: brightness(0.8); }
.menu-item.active img { transform: scale(1.2); filter: brightness(1.2) drop-shadow(0 0 12px #00d4ff); border: 2px solid rgba(0, 212, 255, 0.5); }
#chat-button {
    position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
    background: var(--neon-blue); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10000; box-shadow: 0 0 20px var(--neon-blue);
    transition: 0.3s;
}
#chat-container {
    position: fixed; inset: 0; z-index: 99999;
    display: none; flex-direction: column; align-items: center;
    justify-content: space-between; padding: 60px 20px; box-sizing: border-box;
}
body.chat-open #chat-container { 
    display: flex; 
    animation: chatIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; 
}
@keyframes chatIn {
    from { opacity: 0; transform: translateY(40px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
.chat-scroll-id {
    scroll-margin-top: 100px;
}
.chat-header-center h2 {
    font-size: 32px; margin: 0; text-transform: uppercase;
    text-shadow: 0 0 20px var(--neon-blue); letter-spacing: 2px;
}
.tg-admin-btn {
    display: inline-block;

    color: #ffffff;
    text-decoration: none;

    font-size: 14px;
    border-radius: 15px;
    text-transform: uppercase;
    letter-spacing: 1.5px;

    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
    text-align: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
}
.tg-admin-btn:hover {

    transform: translateY(-3px);
}
.tg-admin-btn:active {
    transform: scale(0.9) translateY(0);
    filter: brightness(0.8);
}
#user-input {
    width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(0, 136, 255, 0.4); border-radius: 25px;
    padding: 20px; color: white; backdrop-filter: blur(15px); outline: none;

[id] {

.site-footer {
    margin-top: 50px;
    padding: 40px 20px 80px 20px;
    background: rgba(0, 10, 30, 0.8);
    backdrop-filter: blur(15px);
    border-top: 2px solid var(--neon-blue);

.footer-content h3 {

.social-links {

.social-item {

.social-item img {

.social-item:hover img {

}
.social-item:active img {

.social-item span {
    display: block;
    margin-top: 8px;

.copyright {

body.loading-lock {
    overflow: hidden !important;
    height: 100vh !important;
    position: fixed
    width: 100%;
}

function createCubes() {
        const cb = document.getElementById('cubes');
        if (!cb) return;
        const images = ['Меч.png', 'Бабочка.png']; 
        for(let i=0; i<15; i++) {
            let c = document.createElement('img');
            const randomImg = images[Math.floor(Math.random() * images.length)];
            c.src = randomImg; 
            
            c.className = 'cube';
            c.style.left = Math.random() * 100 + '%';
            let size = (50 + Math.random() * 30) + 'px';
            c.style.width = size;
            c.style.height = 'auto';
            c.style.position = 'absolute';
            c.style.opacity = '0.5';
            c.style.animationDelay = (Math.random() * 10) + 's';
            
            cb.appendChild(c);
        }
}

function closeP() {
    const ov = document.getElementById('overlay');
    ov.classList.remove('slide-in');
    ov.classList.add('slide-out');
    setTimeout(() => {
        ov.style.display = 'none';
        document.body.style.overflow = 'auto';
        document.documentElement.style.overflow = 'auto';
    }, 400);
}

    const menu = document.querySelector('.bottom-menu');
    document.body.classList.add('loading-lock');
    if (menu) menu.classList.add('hidden');
    createCubes();
    setTimeout(() => {
        document.body.classList.add('loaded');
        
        document.body.classList.remove('loading-lock');
        if (menu) menu.classList.remove('hidden');
        document.body.style.overflow = 'auto';
    }, 2500);
};
window.addEventListener('scroll', () => {
    const thumb = document.getElementById('custom-scroll-thumb');
    const track = document.getElementById('custom-scroll-track');
    const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrollPos = window.pageYOffset;
    const trackHeight = track.offsetHeight - thumb.offsetHeight;
    const moveY = (scrollPos / totalHeight) * trackHeight;
    thumb.style.transform = `translateY(${moveY}px)`;
});
document.querySelectorAll('.menu-item').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        const targetElement = document.querySelector(targetId);

        if (targetElement) {
            targetElement.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
        }
    });
});
window.addEventListener('scroll', () => {
    let fromTop = window.scrollY + 150;

    menuLinks.forEach(link => {
        let section = document.querySelector(link.hash);
        if (
            section.offsetTop <= fromTop &&
            section.offsetTop + section.offsetHeight > fromTop
        ) {
            link.classList.add('active');
        } else {
            link.classList.remove('active');
        }
    });
});
menuLinks.forEach(link => {
    link.addEventListener('click', function() {
        menuLinks.forEach(l => l.classList.remove('active'));
        this.classList.add('active');
    });
});
function toggleChat() {
    document.body.classList.toggle('chat-open');
  }
document.body.classList.add('loading');
setTimeout(() => {
    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.body.classList.remove('loading');
        document.body.classList.add('loaded');
    }, 500);
}, 2500);
</script>
